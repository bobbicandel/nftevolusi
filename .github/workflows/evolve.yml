name: evolve

on:

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

jobs:

  evolve:

    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: install deps
        run: |
          pip install pillow

      - name: run evolution
        run: |
          python ecosystem.py

      - name: commit
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add .
          git commit -m "evolution run" || echo "no changes"
          git push
