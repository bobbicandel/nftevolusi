name: evolve

on:

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: evolution
  cancel-in-progress: false

jobs:

  evolve:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: setup_python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: install_dependencies
        run: |
          pip install pillow

      - name: run_evolution
        run: |
          python ecosystem.py

      - name: commit_and_push
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "auto evolution" || echo "no changes"

          git pull --rebase origin main

          git push
